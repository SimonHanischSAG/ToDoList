<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- IBM-Style: blaue horizontale Streifen bilden "IBM"-Lettern -->
  <!-- Hintergrund -->
  <rect width="32" height="32" rx="4" fill="#1d3763"/>

  <!-- I -->
  <rect x="2"  y="7"  width="5" height="2" fill="#fff"/>
  <rect x="3.5" y="9"  width="2" height="6" fill="#fff"/>
  <rect x="2"  y="15" width="5" height="2" fill="#fff"/>

  <!-- B -->
  <rect x="9"  y="7"  width="5" height="2" fill="#fff"/>
  <rect x="9"  y="12" width="5" height="2" fill="#fff"/>
  <rect x="9"  y="17" width="5" height="2" fill="#fff"/>
  <rect x="9"  y="9"  width="2" height="3" fill="#fff"/>
  <rect x="9"  y="14" width="2" height="3" fill="#fff"/>
  <rect x="13" y="9"  width="1.5" height="3" rx="0.5" fill="#fff"/>
  <rect x="13" y="14" width="1.5" height="3" rx="0.5" fill="#fff"/>

  <!-- M -->
  <rect x="16" y="7"  width="6" height="2" fill="#fff"/>
  <rect x="16" y="11" width="6" height="2" fill="#fff"/>
  <rect x="16" y="15" width="6" height="2" fill="#fff"/>
  <rect x="16" y="9"  width="2" height="2" fill="#fff"/>
  <rect x="20" y="9"  width="2" height="2" fill="#fff"/>
  <rect x="18" y="10" width="2" height="1" fill="#fff"/>
  <rect x="16" y="13" width="2" height="2" fill="#fff"/>
  <rect x="20" y="13" width="2" height="2" fill="#fff"/>

  <!-- Untere Tagline-Streifen (IBM-typisch) -->
  <rect x="2" y="21" width="28" height="1.5" fill="#4589ff" rx="0.5"/>
  <rect x="2" y="24" width="28" height="1.5" fill="#4589ff" rx="0.5"/>
  <rect x="2" y="27" width="28" height="1.5" fill="#4589ff" rx="0.5"/>
</svg>
