name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          # GitHub Pages deployt unter /ToDoList/ – SvelteKit braucht den base-Pfad
          BASE_PATH: /ToDoList
          VITE_BOX_CLIENT_ID: ${{ secrets.VITE_BOX_CLIENT_ID || '9v6ak3n6fh46a3c6djkz7g4vwrltvem6' }}
          VITE_BOX_CLIENT_SECRET: ${{ secrets.VITE_BOX_CLIENT_SECRET }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
